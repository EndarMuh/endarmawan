# Netlify builds the Next.js app inside web/ (NOT the repo-root static index.html).
# The Next.js runtime is auto-detected; @netlify/plugin-nextjs handles SSR + functions.
[build]
  base = "web"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"
