<title>Muhammad Endar Darmawan — Software Engineer</title>
<style>
  /* ============ TOKENS ============ */
  :root{
    --bg:#F4F6F8; --bg-2:#FFFFFF; --surface:#FFFFFF; --surface-2:#EEF1F5;
    --line:#DFE4EB; --line-2:#CBD3DD;
    --text:#141A21; --muted:#5B6673; --muted-2:#7C8894;
    --accent:#D63A48; --accent-strong:#BC2C3A; --accent-ink:#FFFFFF;
    --accent-soft:rgba(214,58,72,.10); --accent-line:rgba(214,58,72,.30);
    --grid:rgba(20,26,33,.045);
    --shadow:0 1px 2px rgba(16,24,40,.04),0 12px 30px -12px rgba(16,24,40,.18);
    --radius:16px;
    --mono:"Cascadia Code","Cascadia Mono",ui-monospace,"SF Mono","Segoe UI Mono",Consolas,Menlo,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,Roboto,Helvetica,Arial,sans-serif;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#0F1216; --bg-2:#141920; --surface:#171C23; --surface-2:#1D242D;
      --line:#28313C; --line-2:#333E4A;
      --text:#E9EDF2; --muted:#98A3B0; --muted-2:#7A8695;
      --accent:#EA4C5A; --accent-strong:#F2606D; --accent-ink:#12161B;
      --accent-soft:rgba(234,76,90,.14); --accent-line:rgba(234,76,90,.34);
      --grid:rgba(255,255,255,.04);
      --shadow:0 1px 2px rgba(0,0,0,.4),0 18px 40px -16px rgba(0,0,0,.6);
    }
  }
  :root[data-theme="light"]{
    --bg:#F4F6F8; --bg-2:#FFFFFF; --surface:#FFFFFF; --surface-2:#EEF1F5;
    --line:#DFE4EB; --line-2:#CBD3DD; --text:#141A21; --muted:#5B6673; --muted-2:#7C8894;
    --accent:#D63A48; --accent-strong:#BC2C3A; --accent-ink:#FFFFFF;
    --accent-soft:rgba(214,58,72,.10); --accent-line:rgba(214,58,72,.30);
    --grid:rgba(20,26,33,.045); --shadow:0 1px 2px rgba(16,24,40,.04),0 12px 30px -12px rgba(16,24,40,.18);
  }
  :root[data-theme="dark"]{
    --bg:#0F1216; --bg-2:#141920; --surface:#171C23; --surface-2:#1D242D;
    --line:#28313C; --line-2:#333E4A; --text:#E9EDF2; --muted:#98A3B0; --muted-2:#7A8695;
    --accent:#EA4C5A; --accent-strong:#F2606D; --accent-ink:#12161B;
    --accent-soft:rgba(234,76,90,.14); --accent-line:rgba(234,76,90,.34);
    --grid:rgba(255,255,255,.04); --shadow:0 1px 2px rgba(0,0,0,.4),0 18px 40px -16px rgba(0,0,0,.6);
  }

  /* ============ BASE ============ */
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  @media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}}
  body{margin:0}
  .page{
    background:var(--bg); color:var(--text);
    font-family:var(--sans); font-size:16px; line-height:1.6;
    -webkit-font-smoothing:antialiased; overflow-x:hidden;
    background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:34px 34px;
  }
  .wrap{width:min(1120px,92vw);margin-inline:auto}
  a{color:inherit;text-decoration:none}
  h1,h2,h3{margin:0;text-wrap:balance;letter-spacing:-.02em;font-weight:800;line-height:1.05}
  p{margin:0}
  .mono{font-family:var(--mono)}
  ::selection{background:var(--accent);color:var(--accent-ink)}
  :focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:6px}

  /* ============ NAV ============ */
  .nav{position:sticky;top:0;z-index:60;
    backdrop-filter:saturate(140%) blur(10px);
    background:color-mix(in srgb,var(--bg) 82%,transparent);
    border-bottom:1px solid var(--line)}
  .nav-inner{display:flex;align-items:center;gap:18px;height:62px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:-.01em;font-size:15px}
  .brand .mark{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;
    background:var(--accent);color:var(--accent-ink);font-family:var(--mono);font-size:12px;font-weight:700;
    box-shadow:0 0 0 1px var(--accent-line)}
  .navlinks{display:flex;gap:6px;margin-left:auto}
  .navlinks a{font-size:13.5px;color:var(--muted);padding:8px 12px;border-radius:9px;font-weight:500;
    transition:color .2s,background .2s}
  .navlinks a:hover{color:var(--text);background:var(--surface-2)}
  .navlinks a.active{color:var(--accent)}
  .controls{display:flex;align-items:center;gap:8px;margin-left:8px}
  .lang{display:inline-flex;border:1px solid var(--line-2);border-radius:999px;overflow:hidden;font-family:var(--mono)}
  .lang button{border:0;background:transparent;color:var(--muted);padding:6px 11px;font-size:11.5px;font-weight:700;
    cursor:pointer;letter-spacing:.03em}
  .lang button.on{background:var(--accent);color:var(--accent-ink)}
  .iconbtn{width:36px;height:36px;border-radius:10px;border:1px solid var(--line-2);background:var(--surface);
    color:var(--text);cursor:pointer;display:grid;place-items:center;transition:border-color .2s,transform .15s}
  .iconbtn:hover{border-color:var(--accent);transform:translateY(-1px)}
  .iconbtn svg{width:17px;height:17px}
  .menubtn{display:none}
  .navlinks a[data-nav].active::after{content:""}

  /* ============ HERO ============ */
  .hero{position:relative;padding:clamp(46px,8vw,96px) 0 clamp(30px,5vw,54px)}
  .hero-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:clamp(24px,5vw,64px);align-items:center}
  .eyebrow{font-family:var(--mono);font-size:12.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);
    display:inline-flex;align-items:center;gap:10px;font-weight:700}
  .eyebrow::before{content:"";width:26px;height:1px;background:var(--accent)}
  .hero h1{font-size:clamp(38px,7vw,68px);margin:18px 0 6px;letter-spacing:-.035em}
  .hero-role{font-family:var(--mono);font-size:clamp(15px,2.4vw,20px);color:var(--muted);font-weight:600;
    height:1.4em;display:flex;align-items:center;gap:10px}
  .hero-role .caret{color:var(--accent)}
  .role-word{color:var(--text);transition:opacity .3s,transform .3s}
  .role-word.swap{opacity:0;transform:translateY(6px)}
  .hero-intro{color:var(--muted);font-size:clamp(15px,1.6vw,17.5px);max-width:52ch;margin-top:20px;line-height:1.65}
  .cta-row{display:flex;flex-wrap:wrap;gap:12px;margin-top:28px}
  .btn{display:inline-flex;align-items:center;gap:9px;padding:12px 18px;border-radius:11px;font-weight:600;
    font-size:14.5px;cursor:pointer;border:1px solid transparent;transition:transform .15s,background .2s,border-color .2s,box-shadow .2s}
  .btn svg{width:16px;height:16px}
  .btn-primary{background:var(--accent);color:var(--accent-ink);box-shadow:0 8px 20px -8px var(--accent)}
  .btn-primary:hover{background:var(--accent-strong);transform:translateY(-2px)}
  .btn-ghost{background:var(--surface);color:var(--text);border-color:var(--line-2)}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px)}
  .coords{margin-top:26px;display:flex;flex-wrap:wrap;gap:8px 22px;font-family:var(--mono);font-size:12px;color:var(--muted-2)}
  .coords span{display:inline-flex;align-items:center;gap:7px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
  .dot.live{background:#3fbf7f;box-shadow:0 0 0 0 rgba(63,191,127,.5);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(63,191,127,.5)}70%{box-shadow:0 0 0 8px rgba(63,191,127,0)}100%{box-shadow:0 0 0 0 rgba(63,191,127,0)}}

  /* portrait */
  .portrait-wrap{position:relative;justify-self:center;width:min(340px,80vw)}
  .portrait{position:relative;border-radius:20px;overflow:hidden;border:1px solid var(--line-2);
    background:var(--surface);box-shadow:var(--shadow);aspect-ratio:433/578}
  .portrait img{width:100%;height:100%;object-fit:cover;display:block}
  .portrait-wrap::before{content:"";position:absolute;inset:18px -18px -18px 18px;border:1.5px dashed var(--accent-line);
    border-radius:20px;z-index:-1}
  .pmark{position:absolute;width:16px;height:16px;border:2px solid var(--accent);z-index:2;opacity:.9}
  .pmark.tl{top:10px;left:10px;border-right:0;border-bottom:0}
  .pmark.tr{top:10px;right:10px;border-left:0;border-bottom:0}
  .pmark.bl{bottom:10px;left:10px;border-right:0;border-top:0}
  .pmark.br{bottom:10px;right:10px;border-left:0;border-top:0}
  .ptag{position:absolute;left:14px;bottom:14px;z-index:3;font-family:var(--mono);font-size:11px;
    background:color-mix(in srgb,var(--bg) 78%,transparent);backdrop-filter:blur(4px);
    border:1px solid var(--line-2);color:var(--text);padding:5px 10px;border-radius:8px;display:flex;align-items:center;gap:7px}

  /* ============ STATS ============ */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:clamp(28px,4vw,44px)}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px 16px}
  .stat-num{font-family:var(--mono);font-size:clamp(26px,4vw,38px);font-weight:700;letter-spacing:-.03em;
    color:var(--text);font-variant-numeric:tabular-nums;line-height:1}
  .stat-num .suf{color:var(--accent)}
  .stat-lbl{color:var(--muted);font-size:12.5px;margin-top:9px;line-height:1.35}

  /* ============ SECTIONS ============ */
  .section{padding:clamp(48px,7vw,88px) 0;border-top:1px solid var(--line)}
  .sec-head{display:flex;align-items:baseline;gap:16px;margin-bottom:clamp(26px,4vw,44px)}
  .sec-num{font-family:var(--mono);font-size:13px;color:var(--accent);font-weight:700}
  .sec-title{font-size:clamp(26px,4vw,40px);letter-spacing:-.03em}
  .sec-line{flex:1;height:1px;background:var(--line);align-self:center}

  /* about */
  .about-grid{display:grid;grid-template-columns:1.4fr .9fr;gap:clamp(26px,5vw,56px)}
  .about-copy p{color:var(--muted);margin-bottom:16px;font-size:16.5px;max-width:62ch}
  .about-copy strong{color:var(--text);font-weight:600}
  .facts{border:1px solid var(--line);border-radius:14px;background:var(--surface);overflow:hidden;align-self:start}
  .fact{display:flex;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line);font-size:13.5px}
  .fact:last-child{border-bottom:0}
  .fact-k{font-family:var(--mono);color:var(--accent);min-width:78px;font-size:11.5px;text-transform:uppercase;
    letter-spacing:.05em;padding-top:2px}
  .fact-v{color:var(--text)}

  /* timeline */
  .timeline{position:relative;display:flex;flex-direction:column;gap:8px}
  .tl-item{display:grid;grid-template-columns:170px 1fr;gap:24px;position:relative;padding-bottom:26px}
  .tl-item:not(:last-child)::before{content:"";position:absolute;left:calc(170px + 5px);top:26px;bottom:-4px;width:1px;background:var(--line-2)}
  .tl-side{text-align:right;padding-top:22px}
  .tl-period{font-family:var(--mono);font-size:12px;color:var(--muted);font-weight:600}
  .tl-loc{font-size:12px;color:var(--muted-2);margin-top:4px}
  .tl-node{position:absolute;left:170px;top:24px;width:12px;height:12px;border-radius:50%;background:var(--bg);
    border:2px solid var(--accent);transform:translateX(-4px);z-index:2}
  .tl-node.cur{background:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
  .tl-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:20px 22px;transition:border-color .2s,transform .2s,box-shadow .2s}
  .tl-card:hover{border-color:var(--accent-line);transform:translateY(-2px);box-shadow:var(--shadow)}
  .tl-role{font-size:18px;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .tl-org{color:var(--accent);font-weight:600;font-size:14.5px;margin-top:3px}
  .badge{font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
    padding:3px 8px;border-radius:999px;background:var(--accent-soft);color:var(--accent);border:1px solid var(--accent-line)}
  .badge.type{background:var(--surface-2);color:var(--muted);border-color:var(--line-2)}
  .bullets{list-style:none;padding:0;margin:14px 0 0;display:flex;flex-direction:column;gap:9px}
  .bullets li{position:relative;padding-left:20px;color:var(--muted);font-size:14.5px;line-height:1.55}
  .bullets li::before{content:"";position:absolute;left:2px;top:9px;width:6px;height:6px;border-radius:2px;
    background:var(--accent);transform:rotate(45deg)}
  .tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:16px}
  .tag{font-family:var(--mono);font-size:11.5px;color:var(--muted);background:var(--surface-2);
    border:1px solid var(--line);padding:4px 9px;border-radius:7px}

  /* projects */
  .filter{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
  .filter button{font-family:var(--mono);font-size:12px;padding:7px 14px;border-radius:999px;border:1px solid var(--line-2);
    background:var(--surface);color:var(--muted);cursor:pointer;transition:all .18s;font-weight:600;letter-spacing:.02em}
  .filter button:hover{color:var(--text);border-color:var(--accent-line)}
  .filter button.on{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
  .proj-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
  .proj-card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:24px;
    display:flex;flex-direction:column;position:relative;overflow:hidden;transition:border-color .25s,transform .25s,box-shadow .25s}
  .proj-card::after{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);transform:scaleX(0);
    transform-origin:left;transition:transform .3s}
  .proj-card:hover{transform:translateY(-4px);border-color:var(--accent-line);box-shadow:var(--shadow)}
  .proj-card:hover::after{transform:scaleX(1)}
  .proj-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .proj-cat{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);font-weight:700}
  .proj-period{font-family:var(--mono);font-size:11.5px;color:var(--muted-2)}
  .proj-name{font-size:20px;font-weight:800;letter-spacing:-.02em;margin:12px 0 4px}
  .proj-role{font-size:13px;color:var(--muted);font-weight:500}
  .proj-desc{color:var(--muted);font-size:14.5px;margin-top:12px;line-height:1.55}
  .proj-card .tags{margin-top:auto;padding-top:16px}
  .proj-card.hide{display:none}

  /* skills */
  .skills-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
  .skill-group{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:22px 22px 24px}
  .sg-title{font-family:var(--mono);font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);
    font-weight:700;display:flex;align-items:center;gap:9px;margin-bottom:16px}
  .sg-title .n{color:var(--muted-2)}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{font-size:13px;padding:7px 13px;border-radius:9px;background:var(--surface-2);border:1px solid var(--line);
    color:var(--text);transition:transform .15s,border-color .2s,color .2s,background .2s;cursor:default}
  .chip:hover{transform:translateY(-2px);border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}

  /* education & org */
  .edu-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(24px,4vw,44px)}
  .col-title{font-family:var(--mono);font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted-2);
    font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:9px}
  .col-title::before{content:"";width:16px;height:1px;background:var(--accent)}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:14px;
    transition:border-color .2s,transform .2s}
  .card:hover{border-color:var(--accent-line);transform:translateY(-2px)}
  .card-h{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
  .card-title{font-size:16.5px;font-weight:700;letter-spacing:-.01em}
  .card-sub{color:var(--accent);font-size:13.5px;font-weight:600;margin-top:3px}
  .card-period{font-family:var(--mono);font-size:11px;color:var(--muted-2);white-space:nowrap;padding-top:3px}
  .card-detail{color:var(--muted);font-size:14px;margin-top:10px}
  .card .bullets{margin-top:12px}
  .card .bullets li{font-size:13.5px}
  .certs{display:flex;flex-wrap:wrap;gap:10px;margin-top:6px}
  .cert{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);
    border-radius:11px;padding:11px 15px}
  .cert svg{width:18px;height:18px;color:var(--accent)}
  .cert b{font-size:13.5px}
  .cert span{font-size:11.5px;color:var(--muted);display:block}

  /* contact */
  .contact-card{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:clamp(28px,5vw,52px);
    position:relative;overflow:hidden}
  .contact-card::before{content:"";position:absolute;top:-40%;right:-10%;width:340px;height:340px;border-radius:50%;
    background:radial-gradient(circle,var(--accent-soft),transparent 70%);pointer-events:none}
  .contact-h{font-size:clamp(26px,4vw,42px);letter-spacing:-.03em;max-width:16ch}
  .contact-p{color:var(--muted);margin-top:16px;max-width:54ch;font-size:16px}
  .contact-actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:26px}
  .cbtn{display:inline-flex;align-items:center;gap:10px;padding:13px 18px;border-radius:12px;border:1px solid var(--line-2);
    background:var(--bg-2);font-weight:600;font-size:14px;cursor:pointer;transition:transform .15s,border-color .2s,color .2s}
  .cbtn svg{width:17px;height:17px;color:var(--accent)}
  .cbtn:hover{transform:translateY(-2px);border-color:var(--accent);color:var(--accent)}
  .cbtn.primary{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
  .cbtn.primary svg{color:var(--accent-ink)}
  .cbtn.primary:hover{background:var(--accent-strong);color:var(--accent-ink)}
  .open-to{margin-top:30px}
  .open-to .lbl{font-family:var(--mono);font-size:11.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted-2);font-weight:700}
  .open-to .chips{margin-top:12px}

  /* footer */
  .footer{border-top:1px solid var(--line);padding:34px 0 46px;margin-top:10px}
  .footer-inner{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:16px}
  .footer .mono{font-size:12px;color:var(--muted-2)}
  .totop{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px;color:var(--muted);cursor:pointer}
  .totop:hover{color:var(--accent)}

  /* toast */
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);z-index:120;
    background:var(--text);color:var(--bg);padding:11px 18px;border-radius:11px;font-size:13.5px;font-weight:600;
    box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;display:flex;align-items:center;gap:9px}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast svg{width:16px;height:16px;color:#3fbf7f}

  /* mobile menu panel */
  .mobile-panel{display:none;position:fixed;inset:62px 0 auto 0;z-index:55;background:var(--bg-2);
    border-bottom:1px solid var(--line);padding:14px 0}
  .mobile-panel.open{display:block}
  .mobile-panel a{display:block;padding:12px 6vw;font-size:16px;color:var(--text);border-bottom:1px solid var(--line)}
  .mobile-panel a:last-child{border-bottom:0}

  /* reveal */
  .reveal{opacity:0;transform:translateY(16px);transition:opacity .6s ease,transform .6s cubic-bezier(.2,.7,.2,1)}
  .reveal.in{opacity:1;transform:none}
  @media (prefers-reduced-motion:reduce){
    .reveal{opacity:1 !important;transform:none !important;transition:none}
    .role-word{transition:none}
    *{animation:none !important}
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width:940px){
    .hero-grid{grid-template-columns:1fr;gap:34px}
    .portrait-wrap{order:-1;width:min(280px,72vw)}
    .about-grid{grid-template-columns:1fr}
    .proj-grid{grid-template-columns:1fr}
    .edu-grid{grid-template-columns:1fr}
  }
  @media (max-width:760px){
    .navlinks{display:none}
    .menubtn{display:grid}

      <div><div class="col-title">${esc(T(UI.eduCol))}</div>${edu}
        <div class="col-title" style="margin-top:22px">${esc(T(UI.certCol))}</div><div class="certs reveal">${certs}</div>
      </div>
      <div><div class="col-title">${esc(T(UI.orgCol))}</div>${org}</div>
    </div>
  </div></section>

  <!-- CONTACT -->
  <section class="section" id="contact"><div class="wrap">
    ${secHead("06",T(UI.sec.contact))}
    <div class="contact-card reveal">
      <h2 class="contact-h">${esc(T(C.contact.h))}</h2>
      <p class="contact-p">${esc(T(C.contact.p))}</p>
      <div class="contact-actions">
        <a class="cbtn primary" href="mailto:${C.contact.email}">${IC.mail} ${esc(C.contact.email)}</a>
        <button class="cbtn" onclick="copyEmail()">${IC.copy} <span id="copyTxt">${esc(T(UI.copy))}</span></button>
        <a class="cbtn" href="https://${C.contact.linkedin}" target="_blank" rel="noopener">${IC.linkedin} LinkedIn</a>
        <a class="cbtn" href="tel:${C.contact.phone.replace(/[^+0-9]/g,'')}">${IC.phone} ${esc(C.contact.phone)}</a>
      </div>
      <div class="open-to"><div class="lbl">${esc(T(UI.openTo))}</div>${openTo}</div>
    </div>
  </div></section>`;

  document.getElementById("app").innerHTML = app;

  // chrome
  const nav=[["about","about"],["experience","experience"],["projects","projects"],["skills","skills"],["education","education"],["contact","contact"]];
  document.getElementById("navlinks").innerHTML = nav.map(([id,k])=>`<a href="#${id}" data-nav="${id}">${esc(T(UI.nav[k]))}</a>`).join("");
  document.getElementById("mobilePanel").innerHTML = nav.map(([id,k])=>`<a href="#${id}" onclick="closeMenu()">${esc(T(UI.nav[k]))}</a>`).join("");
  document.getElementById("footNote").textContent = T(UI.foot);
  document.getElementById("totopTxt").textContent = T(UI.totop);
  document.getElementById("lang-en").classList.toggle("on",LANG==="en");
  document.getElementById("lang-id").classList.toggle("on",LANG==="id");

  initDynamic(animate);
}
function secHead(num,title){return `<div class="sec-head reveal"><span class="sec-num">${num}</span><h2 class="sec-title">${esc(title)}</h2><span class="sec-line"></span></div>`;}

/* ============================ DYNAMIC / INTERACTIONS ============================ */
let io;
function initDynamic(animate){
  const reveals=[...document.querySelectorAll(".reveal")];
  if(io) io.disconnect();
  if(animate){
    io=new IntersectionObserver((ents)=>{ents.forEach(e=>{if(e.isIntersecting){e.target.classList.add("in");io.unobserve(e.target);
      if(e.target.querySelector&&e.target.classList.contains("stat"))countUp(e.target);}});},{threshold:.15,rootMargin:"0px 0px -8% 0px"});
    reveals.forEach(r=>io.observe(r));
  }else{
    reveals.forEach(r=>r.classList.add("in"));
    document.querySelectorAll(".stat-num").forEach(setFinal);
  }
  // active-nav observer
  const secObs=new IntersectionObserver((ents)=>{ents.forEach(e=>{if(e.isIntersecting){
    document.querySelectorAll("[data-nav]").forEach(a=>a.classList.toggle("active",a.getAttribute("data-nav")===e.target.id));}});},{rootMargin:"-45% 0px -50% 0px"});
  document.querySelectorAll("section[id]").forEach(s=>secObs.observe(s));
}
function countUp(stat){
  const el=stat.querySelector(".stat-num"); if(!el)return;
  const n=parseFloat(el.dataset.n),dec=parseInt(el.dataset.dec),suf=el.dataset.suf||"";
  if(window.matchMedia("(prefers-reduced-motion:reduce)").matches){setFinal(el);return;}
  const dur=1100,t0=performance.now();
  (function tick(t){let p=Math.min((t-t0)/dur,1);p=1-Math.pow(1-p,3);
    const val=(n*p).toFixed(dec);
    el.innerHTML=val+(suf?`<span class="suf">${suf}</span>`:"");
    if(p<1)requestAnimationFrame(tick);})(t0);
}
function setFinal(el){const n=parseFloat(el.dataset.n),dec=parseInt(el.dataset.dec),suf=el.dataset.suf||"";
  el.innerHTML=n.toFixed(dec)+(suf?`<span class="suf">${suf}</span>`:"");}

function filterProj(cat,btn){
  document.querySelectorAll(".filter button").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  document.querySelectorAll(".proj-card").forEach(c=>{
    c.classList.toggle("hide",!(cat==="all"||c.dataset.cat===cat));});
}
function copyEmail(){
  navigator.clipboard.writeText(CONTENT.contact.email).then(()=>{toast(T(UI.copied));});
}
function toast(msg){
  const t=document.getElementById("toast");
  t.innerHTML=IC.check+"<span>"+esc(msg)+"</span>";
  t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),1800);
}

/* language + theme */
function setLang(l){LANG=l;localStorage.setItem("port-lang",l);render(false);}
function currentTheme(){return document.documentElement.getAttribute("data-theme")||
  (window.matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");}
function applyThemeIcon(){document.getElementById("themeBtn").innerHTML=currentTheme()==="dark"?IC.sun:IC.moon;}
function toggleTheme(){const next=currentTheme()==="dark"?"light":"dark";
  document.documentElement.setAttribute("data-theme",next);localStorage.setItem("port-theme",next);applyThemeIcon();}
function toggleMenu(){document.getElementById("mobilePanel").classList.toggle("open");}
function closeMenu(){document.getElementById("mobilePanel").classList.remove("open");}

/* rotating role words */
function startRoles(){
  let i=0;
  setInterval(()=>{
    const el=document.getElementById("roleWord");if(!el)return;
    if(window.matchMedia("(prefers-reduced-motion:reduce)").matches){
      i=(i+1)%CONTENT.roles[LANG].length;el.textContent=CONTENT.roles[LANG][i];return;}
    el.classList.add("swap");
    setTimeout(()=>{i=(i+1)%CONTENT.roles[LANG].length;el.textContent=CONTENT.roles[LANG][i];el.classList.remove("swap");},300);
  },2400);
}

/* init */
(function(){
  const savedTheme=localStorage.getItem("port-theme");
  if(savedTheme)document.documentElement.setAttribute("data-theme",savedTheme);
  render(true);
  applyThemeIcon();
  startRoles();
})();
</script>
